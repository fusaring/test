name: 自动化测试

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          pip install pytest selenium requests pytest-html webdriver-manager

      - name: 安装 Chrome 和字体
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb
          sudo apt install -y fonts-wqy-microhei fonts-noto-cjk
          google-chrome --version

      - name: 运行测试
        run: |
          pytest tests/ -v --html=report/report.html --self-contained-html
        continue-on-error: true

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        with:
          name: 测试报告
          path: report/

      - name: 部署报告到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./report
          destination_dir: report
